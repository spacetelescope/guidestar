<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Demo Builder – Step 5: Preview</title>
<link rel="stylesheet" href="../../guidestar-controls.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
</style>
</head>
<body>
<div style="width:100%;height:280px"
     data-guidestar
     data-guidestar-config='{
       "htmlSrc": "../../demo-builder.html",
       "viewport": 1440,
       "repeat": true,
       "initSteps": [
         {"target":"#source-body","action":"add-class","value":"collapsed"},
         {"target":"#recording-body","action":"add-class","value":"collapsed"},
         {"target":"#steps-body","action":"add-class","value":"collapsed"},
         {"target":"#preview-body","action":"remove-class","value":"collapsed"},
         {"target":"#section-preview .card-header","action":"remove-class","value":"collapsed"}
       ],
       "steps": [
         {"target":"#preview-body","action":"highlight","delay":1000,"caption":"The Preview Demo panel — play back the full demo in-place"},
         {"target":"#btn-preview","action":"highlight","delay":1400,"caption":"Click Render Preview to play back the demo using the live guidestar player"}
       ]
     }'></div>
<script src="../../guidestar-controller.js"></script>
</body>
</html>
