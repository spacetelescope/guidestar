<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Demo Builder – Step 4: Edit steps</title>
<link rel="stylesheet" href="../../guidestar-controls.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
</style>
</head>
<body>
<div style="width:100%;height:400px"
     data-guidestar
     data-guidestar-config='{
       "htmlSrc": "../../demo-builder.html",
       "viewport": 1440,
       "repeat": true,
       "initSteps": [
         {"target":"#source-body","action":"add-class","value":"collapsed"},
         {"target":"#recording-body","action":"add-class","value":"collapsed"}
       ],
       "steps": [
         {"target":"#steps-body","action":"highlight","delay":1200,"caption":"Each recorded step appears as an editable card"},
         {"target":"#step-list","action":"highlight","delay":1400,"caption":"Edit the selector, action, delay, and caption inline"},
         {"target":"#btn-clear-steps","action":"highlight","delay":1200,"caption":"Remove individual steps or clear all at once"}
       ]
     }'></div>
<script src="../../guidestar-controller.js"></script>
</body>
</html>
