<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Demo Builder – Step 2: Set demo options</title>
<link rel="stylesheet" href="../../guidestar-controls.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
</style>
</head>
<body>
<div style="width:100%;height:380px"
     data-guidestar
     data-guidestar-config='{
       "htmlSrc": "../../demo-builder.html",
       "viewport": 1440,
       "repeat": true,
       "initSteps": [
         {"target":"#source-body","action":"add-class","value":"collapsed"},
         {"target":"#options-body","action":"remove-class","value":"collapsed"},
         {"target":"#recording-body","action":"add-class","value":"collapsed"},
         {"target":"#steps-body","action":"add-class","value":"collapsed"}
       ],
       "steps": [
         {"target":"#options-body","action":"highlight","delay":800,"caption":"The Demo Options panel — configure height, viewport, and playback settings"},
         {"target":"#opt-height","action":"highlight","delay":1200,"caption":"Set the container height (e.g. 480px)"},
         {"target":"#opt-viewport","action":"highlight","delay":1200,"caption":"Set the viewport width to enable scale mode"},
         {"target":"#opt-repeat","action":"highlight","delay":1000,"caption":"Toggle repeat, cursor, timeline, and other options"}
       ]
     }'></div>
<script src="../../guidestar-controller.js"></script>
</body>
</html>
