<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Demo Builder – Step 6: Copy output</title>
<link rel="stylesheet" href="../../guidestar-controls.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
</style>
</head>
<body>
<div style="width:100%;height:340px"
     data-guidestar
     data-guidestar-config='{
       "htmlSrc": "../../demo-builder.html",
       "viewport": 1440,
       "repeat": true,
       "initSteps": [
         {"target":"#source-body","action":"add-class","value":"collapsed"},
         {"target":"#recording-body","action":"add-class","value":"collapsed"},
         {"target":"#steps-body","action":"add-class","value":"collapsed"},
         {"target":"#output-body","action":"remove-class","value":"collapsed"},
         {"target":"#section-output .card-header","action":"remove-class","value":"collapsed"}
       ],
       "steps": [
         {"target":"#tab-html","action":"highlight","delay":1200,"caption":"The HTML tab shows a self-contained embed snippet"},
         {"target":"#tab-sphinx","action":"click","delay":1000,"caption":"Switch to the Sphinx Directive tab"},
         {"target":"#output-textarea","action":"highlight","delay":1400,"caption":"The Sphinx tab shows a ready-to-paste .. guidestar-demo:: directive"},
         {"target":"#output-body .copy-btn-wrap button","action":"highlight","delay":1200,"caption":"Click Copy to copy the output to the clipboard"}
       ]
     }'></div>
<script src="../../guidestar-controller.js"></script>
</body>
</html>
