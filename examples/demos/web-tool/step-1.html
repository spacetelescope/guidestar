<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Demo Builder – Step 1: Load a source</title>
<link rel="stylesheet" href="../../guidestar-controls.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
</style>
</head>
<body>
<div style="width:100%;height:320px"
     data-guidestar
     data-guidestar-config='{
       "htmlSrc": "../../demo-builder.html",
       "viewport": 1440,
       "repeat": true,
       "initSteps": [
         {"target":"#recording-body","action":"add-class","value":"collapsed"},
         {"target":"#steps-body","action":"add-class","value":"collapsed"}
       ],
       "steps": [
         {"target":"#source-url","action":"highlight","delay":1200,"caption":"Enter the URL of your wireframe or existing demo"},
         {"target":"#btn-fetch","action":"highlight","delay":1200,"caption":"Click Load to fetch and auto-detect the source"},
         {"target":"#source-type-badge","action":"highlight","delay":1500,"caption":"A badge confirms the detected type — Wireframe, Demo (HTML), or Demo (Sphinx)"}
       ]
     }'></div>
<script src="../../guidestar-controller.js"></script>
</body>
</html>
