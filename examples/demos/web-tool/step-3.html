<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Demo Builder – Step 3: Record steps</title>
<link rel="stylesheet" href="../../guidestar-controls.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
</style>
</head>
<body>
<div style="width:100%;height:520px"
     data-guidestar
     data-guidestar-config='{
       "htmlSrc": "../../demo-builder.html",
       "viewport": 1440,
       "repeat": true,
       "initSteps": [
         {"target":"#source-body","action":"add-class","value":"collapsed"},
         {"target":"#steps-body","action":"add-class","value":"collapsed"}
       ],
       "steps": [
         {"target":"#btn-record","action":"highlight","delay":1000,"caption":"Click Enable Record Mode to start capturing clicks"},
         {"target":"#demo-iframe","action":"highlight","delay":1400,"caption":"Click any element in the wireframe to capture a step"},
         {"target":"#record-status","action":"highlight","delay":1000,"caption":"The recording badge shows the current state"}
       ]
     }'></div>
<script src="../../guidestar-controller.js"></script>
</body>
</html>
