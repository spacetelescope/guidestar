<!DOCTYPE html>
<!--
  Open Library Search — live demo page for Guidestar mock-API example.

  This page is intentionally designed to work in two modes:

  1. Standalone — opens directly in a browser and searches the real
     Open Library API (https://openlibrary.org/search.json).

  2. Embedded via Guidestar htmlSrc — loaded by the controller and
     injected into a demo container.  The demo sets
     window.__guidestarMock to an array of book objects before
     playback starts.  When the mock is present the search handler
     uses it instead of the live API, so the demo response is always
     instant, deterministic, and costs no external requests.

  Viewport: 640px wide × no fixed height — use a container height of
  at least 460px in the demo config.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Open Library Search</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f0f4f8;
    color: #1a202c;
    padding: 28px 20px 20px;
  }

  #search-app { max-width: 620px; margin: 0 auto; }

  .app-header { margin-bottom: 22px; }
  .app-header h1 {
    font-size: 20px;
    font-weight: 700;
    color: #1a202c;
    margin-bottom: 3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .app-header p { font-size: 13px; color: #718096; }

  .search-row { display: flex; gap: 8px; margin-bottom: 18px; }

  #search-input {
    flex: 1;
    padding: 10px 14px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    color: #1a202c;
    background: #fff;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  #search-input:focus {
    border-color: #4299e1;
    box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15);
  }

  #search-btn {
    padding: 10px 20px;
    background: #4299e1;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }

  #search-btn:hover  { background: #3182ce; }
  #search-btn:active { background: #2b6cb0; }
  #search-btn:disabled { background: #a0aec0; cursor: not-allowed; }

  .result-card {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 13px 15px;
    margin-bottom: 9px;
    display: flex;
    align-items: flex-start;
    gap: 11px;
  }

  .result-icon {
    width: 34px;
    height: 34px;
    background: #ebf8ff;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .result-body { flex: 1; min-width: 0; }
  .result-title { font-size: 14px; font-weight: 600; color: #1a202c; }
  .result-meta  { font-size: 12px; color: #718096; margin-top: 2px; }

  .result-year {
    font-size: 12px;
    color: #a0aec0;
    white-space: nowrap;
    padding-top: 1px;
  }

  .status {
    padding: 30px 16px;
    text-align: center;
    font-size: 14px;
    color: #718096;
  }
  .status .status-icon { font-size: 28px; margin-bottom: 8px; }
  .error { color: #e53e3e; }
</style>
</head>
<body>
<div id="search-app">
  <div class="app-header">
    <h1>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke="#4299e1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" stroke="#4299e1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Open Library Search
    </h1>
    <p>Search millions of books via the Open Library API.</p>
  </div>

  <div class="search-row">
    <input id="search-input" type="text"
           placeholder="Search by title, author, or subject…"
           autocomplete="off">
    <button id="search-btn" type="button">Search</button>
  </div>

  <div id="results">
    <div class="status">
      <div class="status-icon">📖</div>
      Enter a search term above to find books.
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var btn   = document.getElementById('search-btn');
  var input = document.getElementById('search-input');
  var area  = document.getElementById('results');

  // Guard: if Guidestar re-injects the page into a second container on
  // the same docs page, getElementById returns the first element found.
  // The guard below is a no-op for standalone use; it prevents a double
  // bind error if the exact same element reference already has a listener.
  if (!btn || btn.__gsSearchBound) return;
  btn.__gsSearchBound = true;

  function esc(str) {
    return String(str == null ? '' : str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function renderResults(books) {
    if (!books || !books.length) {
      area.innerHTML =
        '<div class="status"><div class="status-icon">🔍</div>No results found.</div>';
      return;
    }
    area.innerHTML = books.map(function (b) {
      return (
        '<div class="result-card">' +
          '<div class="result-icon">📚</div>' +
          '<div class="result-body">' +
            '<div class="result-title">' + esc(b.title)  + '</div>' +
            '<div class="result-meta">'  + esc(b.author || 'Unknown author') + '</div>' +
          '</div>' +
          (b.year
            ? '<div class="result-year">' + esc(b.year) + '</div>'
            : '') +
        '</div>'
      );
    }).join('');
  }

  function doSearch() {
    var q = (input.value || '').trim();
    if (!q) return;

    // ── Guidestar demo mock hook ───────────────────────────────────────────
    // Set window.__guidestarMock = {"search": [{title, author, year}, ...]}
    // in a "mock-api" initStep to bypass the live Open Library API.
    // Each API-calling handler reads its own named key so multiple buttons
    // on the same page can be mocked independently.
    if (window.__guidestarMock && window.__guidestarMock.search) {
      renderResults(window.__guidestarMock.search);
      return;
    }

    // ── Real Open Library API call ─────────────────────────────────────────
    var origLabel   = btn.textContent;
    btn.disabled    = true;
    btn.textContent = 'Searching…';
    area.innerHTML  = '<div class="status">Loading…</div>';

    fetch(
      'https://openlibrary.org/search.json' +
      '?q='      + encodeURIComponent(q) +
      '&limit=5' +
      '&fields=title,author_name,first_publish_year'
    )
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function (data) {
        var books = (data.docs || []).map(function (d) {
          return {
            title:  d.title,
            author: d.author_name ? d.author_name[0] : null,
            year:   d.first_publish_year
          };
        });
        renderResults(books);
      })
      .catch(function (err) {
        area.innerHTML =
          '<div class="status error">' +
          '<div class="status-icon">⚠️</div>' +
          'Could not reach Open Library: ' + esc(err.message) +
          '</div>';
      })
      .finally(function () {
        btn.disabled    = false;
        btn.textContent = origLabel;
      });
  }

  btn.addEventListener('click', doSearch);
  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') doSearch();
  });
}());
</script>
</body>
</html>
