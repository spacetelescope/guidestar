<!DOCTYPE html>
<!--
  Guidestar demo: mock-api example.

  Loads live-app.html (a plain Open Library search page) via htmlSrc and
  registers a "mock-api" custom action that wraps window.fetch to intercept
  calls to openlibrary.org/search.json. The live page is completely unmodified
  and has no knowledge of Guidestar — the interception is handled entirely
  within this demo file.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Open Library Search — Mocked Demo</title>
<link rel="stylesheet" href="../../guidestar-controls.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
</style>
</head>
<body>

<!--
  ① Pre-install the fetch interceptor BEFORE the controller loads.

  window.fetch is wrapped here so it is already in place when the
  controller's autoDiscover() starts fetching live-app.html and when
  the live page's external <script src> bundles execute later.
  This guarantees interception regardless of async loading order.

  The wrapper reads window.__gsMocks by reference, so the mock-api
  action (registered below) can populate it at any time — including
  via initSteps after the live page has loaded — and the running
  wrapper will immediately see the new entries.
-->
<script>
(function () {
  var origFetch = window.fetch;
  window.__gsMocks = window.__gsMocks || {};
  window.__gsOrigFetch = origFetch;
  window.fetch = function (url, opts) {
    var u = String(url);
    var mocks = window.__gsMocks;
    for (var pattern in mocks) {
      if (u.indexOf(pattern) !== -1) {
        var body = mocks[pattern];
        return Promise.resolve({
          ok: true, status: 200,
          json: function () { return Promise.resolve(body); },
          text: function () { return Promise.resolve(JSON.stringify(body)); }
        });
      }
    }
    return origFetch.call(this, url, opts);
  };
}());
</script>

<div style="width:100%;height:460px"
     data-guidestar
     data-guidestar-config='{
  "htmlSrc": "live-app.html",
  "allowUserInteractions": false,
  "repeat": true,
  "cursor": true,
  "timeline": true,
  "initSteps": [
    {
      "target": "#search-app",
      "action": "mock-api",
      "value": "{\"openlibrary.org/search.json\":{\"numFound\":5,\"docs\":[{\"title\":\"Cosmos\",\"author_name\":[\"Carl Sagan\"],\"first_publish_year\":1980},{\"title\":\"The Pale Blue Dot\",\"author_name\":[\"Carl Sagan\"],\"first_publish_year\":1994},{\"title\":\"A Brief History of Time\",\"author_name\":[\"Stephen Hawking\"],\"first_publish_year\":1988},{\"title\":\"Astrophysics for People in a Hurry\",\"author_name\":[\"Neil deGrasse Tyson\"],\"first_publish_year\":2017},{\"title\":\"The Elegant Universe\",\"author_name\":[\"Brian Greene\"],\"first_publish_year\":1999}]}}"
    }
  ],
  "steps": [
    {
      "target": "#search-input",
      "action": "type-text",
      "value": "space exploration",
      "delay": 2200,
      "caption": "^Type a search query"
    },
    {
      "target": "#search-btn",
      "action": "click",
      "delay": 1800,
      "caption": "Click Search — the demo intercepts the API call"
    },
    {
      "target": "#results",
      "action": "highlight",
      "delay": 3500,
      "caption": "Results appear from the demo\u2019s mock data \u2014 no real API request was made"
    }
  ]
}'></div>

<!--
  ② Load the controller.  autoDiscover() fires and starts an async
  fetch() of live-app.html.  The inline script above has already
  wrapped window.fetch, so any fetch calls made during or after the
  live page's script execution are intercepted.
-->
<script src="../../guidestar-controller.js"></script>

<script>
// ③ Register the "mock-api" custom action.
//
// Populates window.__gsMocks with the URL-keyed fixture data.
// The fetch wrapper installed above reads __gsMocks by reference,
// so entries added here take effect immediately — even for API calls
// made during SPA initialisation before this action runs.
//
// On each restart initSteps re-execute, so the map is refreshed on
// every loop iteration without stacking fetch wrappers.
Guidestar.registerAction('mock-api', function (step, el, contentRoot) {
  try {
    var mocks = JSON.parse(step.value); // { urlSubstring: responseBody, … }
    // Reset then repopulate so stale keys from a previous loop don't linger.
    window.__gsMocks = {};
    for (var k in mocks) window.__gsMocks[k] = mocks[k];
  } catch (e) {
    console.error('[Guidestar] mock-api: step value is not valid JSON', e);
  }
});
</script>

</body>
</html>
