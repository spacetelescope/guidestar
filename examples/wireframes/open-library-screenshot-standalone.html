        /*
 * guidestar-controls.css
 *
 * Styles that must live in the main document (outside Shadow DOM)
 * because they target elements inside the consumer's HTML.
 *
 * The play/pause/restart button styles are inside the Shadow DOM
 * (see guidestar-controller.js) and are themeable via CSS
 * custom properties — see README for the full list.
 */

/* ── Container base ──────────────────────────────────────────────── */

[data-guidestar] {
    position: relative;
    overflow: hidden;
    isolation: isolate;
}

/* ── Content root ────────────────────────────────────────────────── */

/*
 * .gs-content holds the injected wireframe HTML.
 * transform-origin is set here so viewport-scale mode (transform: scale())
 * always anchors to the top-left corner of the container.
 */

.gs-content {
    transform-origin: top left;
}

/* ── Fullscreen button ───────────────────────────────────────────── */

/*
 * .gs-fullscreen-host wraps the fullscreen toggle button in the
 * top-right corner of the container.  It is a plain DOM element
 * (not Shadow DOM) so it inherits the same --gs-control-* custom
 * properties used by the play/pause controls.
 *
 * Visibility: hidden by default; revealed on container hover or when
 * the demo is paused (JS adds .gs-fullscreen-host--visible).
 *
 * Themeable via the same --gs-control-* custom properties as the
 * bottom-right controls.  Use --gs-control-top to adjust the offset
 * (default: 12px).
 */

.gs-fullscreen-host {
    position: absolute;
    top: var(--gs-control-top, 12px);
    right: var(--gs-control-right, 12px);
    z-index: 10000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
}

[data-guidestar]:hover .gs-fullscreen-host,
.gs-fullscreen-host--visible {
    opacity: 1;
    pointer-events: auto;
}

.gs-fullscreen-btn {
    width: var(--gs-control-size, 44px);
    height: var(--gs-control-size, 44px);
    border-radius: var(--gs-control-radius, 8px);
    border: var(--gs-control-border, none);
    padding: 0;
    background: var(--gs-control-bg, rgba(0, 0, 0, 0.55));
    color: var(--gs-control-color, #fff);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.2s;
    position: relative;
}

.gs-fullscreen-btn:hover {
    background: var(--gs-control-bg-hover, rgba(0, 0, 0, 0.75));
    transform: scale(1.05);
}

.gs-fullscreen-btn svg {
    width: var(--gs-control-icon-size, 22px);
    height: var(--gs-control-icon-size, 22px);
    fill: currentColor;
}

.gs-fullscreen-btn:focus-visible {
    outline: 2px solid var(--gs-control-color, #fff);
    outline-offset: 2px;
}

/* Tooltip (appears to the left of the button) */
.gs-fullscreen-btn::after {
    content: attr(data-tooltip);
    position: absolute;
    right: 100%;
    top: 50%;
    transform: translateY(-50%);
    margin-right: 8px;
    background: var(--gs-control-tooltip-bg, rgba(0, 0, 0, 0.8));
    color: var(--gs-control-tooltip-color, #fff);
    padding: 4px 10px;
    border-radius: 4px;
    font-family: var(--pst-font-family-base,
        -apple-system, "BlinkMacSystemFont", "Segoe UI", "Helvetica Neue",
        Arial, sans-serif);
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
}

.gs-fullscreen-btn:hover::after {
    opacity: 1;
}

/* When the container itself is fullscreen, fill the screen */
[data-guidestar]:fullscreen,
[data-guidestar]:-webkit-full-screen {
    width: 100vw !important;
    height: 100vh !important;
}

@media (prefers-reduced-motion: reduce) {
    .gs-fullscreen-btn {
        transition: none;
    }
    .gs-fullscreen-btn:hover {
        transform: none;
    }
}

/* ── Resize handle ───────────────────────────────────────────────── */

/*
 * .gs-resize-handle — 16×16 px drag target in the bottom-right corner.
 * Shows a standard se-resize cursor; a grippy diagonal-lines visual
 * (using a repeating-linear-gradient) mirrors the browser/devtools style.
 *
 * .gs-resize-badge — live "W × H" label shown only while dragging.
 */

.gs-resize-handle {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 16px;
    height: 16px;
    cursor: se-resize;
    z-index: 10001;
    /* diagonal grip dots */
    background-image: repeating-linear-gradient(
        -45deg,
        rgba(255, 255, 255, 0.45) 0px,
        rgba(255, 255, 255, 0.45) 1px,
        transparent 1px,
        transparent 4px
    );
    background-size: 16px 16px;
    background-position: bottom right;
    border-radius: 0 0 2px 0;
    opacity: 0;
    transition: opacity 0.2s;
}

[data-guidestar]:hover .gs-resize-handle {
    opacity: 1;
}

.gs-resize-badge {
    position: absolute;
    bottom: 20px;
    right: 4px;
    background: var(--gs-control-tooltip-bg, rgba(0, 0, 0, 0.8));
    color: var(--gs-control-tooltip-color, #fff);
    font-family: var(--pst-font-family-base,
        -apple-system, "BlinkMacSystemFont", "Segoe UI", "Helvetica Neue",
        Arial, sans-serif);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 10002;
    opacity: 0;
    transition: opacity 0.15s;
}

.gs-resize-badge--visible {
    opacity: 1;
}

/* ── Branding badge ──────────────────────────────────────────────── */

/*
 * .gs-branding — small "demopowered by guidestar" link badge in the
 * bottom-left corner, to the left of the timeline track.
 *
 * Visible on container hover, hidden otherwise (same rhythm as the
 * timeline).  Hidden by default; set config.branding to false to
 * suppress entirely.
 *
 * The tooltip text ("demo powered by guidestar") appears above the badge
 * via a CSS ::after pseudo-element.
 */

.gs-branding {
    position: absolute;
    bottom: var(--gs-control-bottom, 12px);
    left: var(--gs-control-left, 12px);
    z-index: 10000;
    width: 24px;
    height: 24px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    text-decoration: none;
}

[data-guidestar]:hover .gs-branding,
.gs-branding--visible {
    opacity: 1;
    pointer-events: auto;
}

.gs-branding svg {
    width: 24px;
    height: 24px;
    display: block;
    border-radius: 4px;
    transition: transform 0.15s ease;
}

.gs-branding:hover svg {
    transform: scale(1.1);
}

/* Tooltip above the badge — left-aligned to the badge's left edge so it
   extends rightward and does not overlap the timeline track */
.gs-branding::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 100%;
    left: 0;
    margin-bottom: 8px;
    background: var(--gs-control-tooltip-bg, rgba(0, 0, 0, 0.8));
    color: var(--gs-control-tooltip-color, #fff);
    padding: 4px 10px;
    border-radius: 4px;
    font-family: var(--pst-font-family-base,
        -apple-system, "BlinkMacSystemFont", "Segoe UI", "Helvetica Neue",
        Arial, sans-serif);
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
}

.gs-branding:hover::after {
    opacity: 1;
}

@media (prefers-reduced-motion: reduce) {
    .gs-branding {
        transition: none;
    }
    .gs-branding svg {
        transition: none;
    }
    .gs-branding:hover svg {
        transform: none;
    }
}

/* ── Highlight animation applied to targeted elements ────────────── */

@keyframes gs-highlight-pulse {
    0%   { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0.6); }
    70%  { box-shadow: 0 0 0 8px rgba(255, 152, 0, 0); }
    100% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0); }
}

.gs-highlight {
    animation: gs-highlight-pulse 0.8s ease-out;
    outline: 2px solid rgba(255, 152, 0, 0.7);
    outline-offset: 2px;
    border-radius: 2px;
}

/* ── Caption overlay ─────────────────────────────────────────────── */

/*
 * Themeable via CSS custom properties:
 *   --gs-caption-bg           Background (default: rgba(0,0,0,0.72))
 *   --gs-caption-color        Text color (default: #fff)
 *   --gs-caption-font-size    Font size (default: 14px)
 *   --gs-caption-padding      Padding (default: 10px 16px)
 *   --gs-caption-inset        Left & right inset — keeps the caption
 *                              clear of the control button (default: 68px)
 */

.gs-caption {
    position: absolute;
    left: var(--gs-caption-inset, 68px);
    right: var(--gs-caption-inset, 68px);
    z-index: 9998;
    min-height: var(--gs-control-size, 44px);
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 16px;
    background: var(--gs-caption-bg, rgba(0, 0, 0, 0.72));
    color: var(--gs-caption-color, #fff);
    /* Inherit the host page's font when embedded in a Sphinx/pydata-sphinx-theme
       page (--pst-font-family-base is set on :root there); fall back to the same
       system stack when running in a standalone iframe where that variable is absent.
       This keeps captions visually consistent across both embedding modes. */
    font-family: var(--pst-font-family-base,
        -apple-system, "BlinkMacSystemFont", "Segoe UI", "Helvetica Neue",
        Arial, sans-serif);
    font-size: var(--gs-caption-font-size, 14px);
    line-height: 1.4;
    text-align: center;
    pointer-events: none;
    border-radius: 6px;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.gs-caption--top {
    top: 12px;
    bottom: auto;
}

.gs-caption--bottom {
    bottom: 34px;
    top: auto;
    transition: bottom 0.3s ease, opacity 0.3s ease;
}

.gs-caption--bottom.gs-caption--timeline-visible {
    bottom: 84px;
}

.gs-caption--visible {
    opacity: 1;
}

/* ── Controls host positioning ───────────────────────────────────── */

.gs-controls-host {
    position: absolute;
    bottom: 12px;
    right: 12px;
    z-index: 10000;
}

/* ── Timeline overlay ────────────────────────────────────────────── */

/*
 * Themeable via CSS custom properties:
 *   --gs-timeline-bg           Track background (default: rgba(0,0,0,0.5))
 *   --gs-timeline-dot-color    Dot border & fill color (default: #fff)
 *   --gs-timeline-dot-size     Dot diameter (default: 10px)
 *   --gs-timeline-line-color   Connecting line color (default: rgba(255,255,255,0.3))
 */

.gs-timeline {
    position: absolute;
    bottom: 12px;
    left: var(--gs-caption-inset, 68px);
    right: var(--gs-caption-inset, 68px);
    z-index: 9999;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 6px;
    background: var(--gs-timeline-bg, rgba(0, 0, 0, 0.5));
    border-radius: 6px 6px 0 0;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
}

.gs-timeline--visible {
    opacity: 1;
    pointer-events: auto;
}

/* Connecting line behind dots */
.gs-timeline::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 12px;
    right: 12px;
    height: 2px;
    background: var(--gs-timeline-line-color, rgba(255, 255, 255, 0.3));
    transform: translateY(-50%);
    pointer-events: none;
}

.gs-timeline__dot {
    position: relative;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: transparent;
    padding: 0;
    cursor: pointer;
    z-index: 1;
    flex-shrink: 0;
    /* The visual dot is rendered by ::after; this element is just the hit area */
}

/* Visual dot circle rendered as pseudo-element */
.gs-timeline__dot::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: var(--gs-timeline-dot-size, 8px);
    height: var(--gs-timeline-dot-size, 8px);
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 2px solid var(--gs-timeline-dot-color, var(--gs-control-color, #fff));
    background: transparent;
    transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    pointer-events: none;
}

/* Chapter dot: larger size to mark a narrative section boundary */
.gs-timeline__dot--chapter::after {
    width: var(--gs-timeline-chapter-dot-size, 14px);
    height: var(--gs-timeline-chapter-dot-size, 14px);
    border-width: 2.5px;
}

.gs-timeline__dot:hover::after {
    transform: translate(-50%, -50%) scale(1.3);
}

.gs-timeline__dot--filled::after {
    background: var(--gs-timeline-dot-color, var(--gs-control-color, #fff));
}

.gs-timeline__dot--current::after {
    transform: translate(-50%, -50%) scale(1.3);
    box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.35);
}

.gs-timeline__dot--current:hover::after {
    transform: translate(-50%, -50%) scale(1.4);
}

/* Out-of-range dots (outside stepRange window): dimmed border/fill but still clickable */
.gs-timeline__dot--out-of-range::after {
    opacity: 0.3;
}

.gs-timeline__dot--out-of-range.gs-timeline__dot--filled::after {
    opacity: 0.25;
}

/* ── Timeline dot hover tooltip ──────────────────────────────────── */

.gs-timeline-tooltip {
    position: absolute;
    z-index: 10001;
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 4px;
    background: var(--gs-control-bg, rgba(0, 0, 0, 0.55));
    border-radius: var(--gs-control-radius, 8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease;
}

/* Invisible bridge extending below the tooltip to cover the gap to the dot */
.gs-timeline-tooltip::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 0;
    right: 0;
    height: 10px;
}

.gs-timeline-tooltip--visible {
    opacity: 1;
    pointer-events: auto;
}

.gs-timeline-tooltip__btn {
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 4px;
    background: transparent;
    color: var(--gs-control-color, #fff);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 0;
    transition: background 0.15s ease;
}

.gs-timeline-tooltip__btn[hidden] {
    display: none;
}

.gs-timeline-tooltip__btn:hover {
    background: rgba(255, 255, 255, 0.15);
}

.gs-timeline-tooltip__btn svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
}

.gs-timeline-tooltip__btn--play {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
}

.gs-timeline-tooltip__btn--play:hover {
    background: rgba(255, 255, 255, 0.25);
}

/* ── Scroll indicator ────────────────────────────────────────────────────── */

@keyframes gs-scroll-flash {
    0%   { opacity: 0; transform: translateY(-6px) scale(0.85); }
    18%  { opacity: 1; transform: translateY(0)    scale(1);    }
    65%  { opacity: 1; transform: translateY(0)    scale(1);    }
    100% { opacity: 0; transform: translateY(4px)  scale(0.9);  }
}

.gs-scroll-indicator {
    position: absolute;
    z-index: 9992;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--gs-control-bg, rgba(0, 0, 0, 0.55));
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
}

.gs-scroll-indicator--active {
    animation: gs-scroll-flash 0.75s ease-out forwards;
}

.gs-scroll-indicator svg {
    width: 20px;
    height: 20px;
    fill: var(--gs-control-color, #fff);
}

/* ── Restart overlay ─────────────────────────────────────────────────────── */

@keyframes gs-restart-expand {
    0%   { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(2.5); }
}

.gs-restart-overlay {
    position: absolute;
    inset: 0;
    z-index: 9990;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
}

.gs-restart-overlay--active {
    animation: gs-restart-expand 0.7s ease-out forwards;
}

.gs-restart-overlay__icon {
    width: 72px;
    height: 72px;
    border-radius: var(--gs-control-radius, 8px);
    background: var(--gs-control-bg, rgba(0, 0, 0, 0.3));
    display: flex;
    align-items: center;
    justify-content: center;
}

.gs-restart-overlay__icon svg {
    width: 40px;
    height: 40px;
    fill: var(--gs-control-color, #fff);
}

/* ── Focus indicators ────────────────────────────────────────────── */

.gs-timeline__dot:focus-visible {
    outline: 2px solid var(--gs-timeline-dot-color, var(--gs-control-color, #fff));
    outline-offset: 2px;
}

.gs-timeline-tooltip__btn:focus-visible {
    outline: 2px solid var(--gs-control-color, #fff);
    outline-offset: 1px;
}

/* ── Reduced motion ──────────────────────────────────────────────── */

@media (prefers-reduced-motion: reduce) {
    .gs-highlight {
        animation: none;
    }
    .gs-caption {
        transition: none;
    }
    .gs-caption--bottom {
        transition: none;
    }
    .gs-timeline {
        transition: none;
    }
    .gs-timeline__dot::after {
        transition: none;
    }
    .gs-timeline__dot--chapter::after {
        transition: none;
    }
    .gs-timeline__dot:hover::after {
        transform: translate(-50%, -50%);
    }
    .gs-timeline__dot--current::after {
        transform: translate(-50%, -50%);
    }
    .gs-timeline-tooltip {
        transition: none;
    }
    .gs-timeline-tooltip__btn {
        transition: none;
    }
    .gs-restart-overlay--active {
        animation: none;
        opacity: 0;
    }
    .gs-scroll-indicator--active {
        animation: none;
        opacity: 0;
    }
}

/* Config-driven reduced motion (reduceMotion: true) */
.gs-reduce-motion .gs-highlight {
    animation: none;
}
.gs-reduce-motion .gs-caption,
.gs-reduce-motion .gs-caption--bottom {
    transition: none;
}
.gs-reduce-motion .gs-timeline,
.gs-reduce-motion .gs-timeline__dot::after,
.gs-reduce-motion .gs-timeline-tooltip,
.gs-reduce-motion .gs-timeline-tooltip__btn {
    transition: none;
}
.gs-reduce-motion .gs-timeline__dot:hover::after,
.gs-reduce-motion .gs-timeline__dot--current::after {
    transform: translate(-50%, -50%);
}
.gs-reduce-motion .gs-restart-overlay--active {
    animation: none;
    opacity: 0;
}
.gs-reduce-motion .gs-scroll-indicator--active {
    animation: none;
    opacity: 0;
}

/* ── Interaction blocker ─────────────────────────────────────────────────── */

/*
 * .gs-interaction-blocker — transparent glass pane that covers the content
 * root when allowUserInteractions: false (the default).  Intercepts all
 * clicks over the demo area so they toggle play/pause instead of activating
 * links or form controls in the underlying content.
 *
 * z-index: 1 puts it above .gs-content (z-index: auto) but below all control
 * overlays (restart 9990, captions 9998, timeline 9999, controls 10000).
 */

.gs-interaction-blocker {
    position: absolute;
    inset: 0;
    z-index: 1;
    background: transparent;
    cursor: pointer;
}

        <script>
        /* guidestar-controller.js (inlined) */
        /**
 * Guidestar — Generic interactive demo engine.
 *
 * Fetches arbitrary HTML, injects it into a container, overlays play/pause/restart
 * controls (inside a Shadow DOM for style isolation), and steps through a
 * configurable sequence of actions that target elements by CSS selector.
 *
 * Supports multiple independent instances on the same page.
 *
 * Usage (declarative):
 *   <div data-guidestar
 *        data-guidestar-config='{"htmlSrc":"app.html","steps":[...]}'>
 *   </div>
 *
 * Usage (programmatic):
 *   const demo = new Guidestar(element, { htmlSrc: 'app.html', steps: [...] });
 */
(function (root) {
    'use strict';

    // Guard: if already loaded, do not re-initialise.
    if (root.Guidestar) { return; }

    // ── Custom action registry (shared across all instances) ────────────
    // Stored on window so scripts that load before this one (or a second
    // load of this file) share the same registry.
    var _customActions = root.__guidestarActions || {};
    root.__guidestarActions = _customActions;

    // ── Step parser ─────────────────────────────────────────────────────

    /**
     * Parse a single shorthand string into a step object.
     *
     * Format:  target@delay:action=value|caption text
     *   - target  : CSS selector (e.g. "#btn", ".panel")
     *   - @delay  : optional integer milliseconds (default 2000)
     *               append "!" to suppress highlight (e.g. @1500!)
     *   - :action : action name
     *   - =value  : optional value for the action
     *   - |text   : optional caption text (append ^ or v prefix to
     *               force top or bottom positioning)
     *
     * Special: if target is "pause", no selector is needed.
     */
    function parseStepString(str) {
        var delay = 2000;
        var noHighlight = false;
        var noScroll = false;
        var chapter = false;
        var caption = undefined;
        var captionOptions = undefined;
        var working = str;

        // Extract |caption (must be done first, before @/: parsing)
        var pipeIdx = working.indexOf('|');
        if (pipeIdx !== -1) {
            var captionPart = working.substring(pipeIdx + 1);
            working = working.substring(0, pipeIdx);
            if (captionPart.length > 0) {
                var firstChar = captionPart.charAt(0);
                if (firstChar === '^') {
                    caption = captionPart.substring(1);
                    captionOptions = { position: 'top' };
                } else if (firstChar === 'v') {
                    caption = captionPart.substring(1);
                    captionOptions = { position: 'bottom' };
                } else {
                    caption = captionPart;
                }
            }
        }

        // Extract @delay
        if (working.indexOf('@') !== -1) {
            var atIdx = working.indexOf('@');
            var before = working.substring(0, atIdx);
            var after = working.substring(atIdx + 1);
            var colonIdx = after.indexOf(':');
            var delayPart, rest;
            if (colonIdx !== -1) {
                delayPart = after.substring(0, colonIdx);
                rest = after.substring(colonIdx); // includes leading ":"
            } else {
                delayPart = after;
                rest = '';
            }
            if (delayPart.endsWith('!')) {
                noHighlight = true;
                delayPart = delayPart.slice(0, -1);
            }
            if (delayPart.endsWith('~')) {
                noScroll = true;
                delayPart = delayPart.slice(0, -1);
            }
            if (delayPart.endsWith('*')) {
                chapter = true;
                delayPart = delayPart.slice(0, -1);
            }
            delay = parseInt(delayPart, 10) || 2000;
            working = before + rest;
        }

        // Extract :action=value
        var target = null;
        var action = 'highlight';
        var value = undefined;

        if (working.indexOf(':') !== -1) {
            var ci = working.indexOf(':');
            target = working.substring(0, ci) || null;
            var actionPart = working.substring(ci + 1);
            if (actionPart.indexOf('=') !== -1) {
                var ei = actionPart.indexOf('=');
                action = actionPart.substring(0, ei);
                value = actionPart.substring(ei + 1);
            } else {
                action = actionPart;
            }
        } else {
            target = working || null;
        }

        if (target === 'pause') {
            var pauseStep = { target: null, action: 'pause', delay: delay, noHighlight: noHighlight, noScroll: noScroll };
            if (chapter) pauseStep.chapter = true;
            if (caption !== undefined) pauseStep.caption = caption;
            if (captionOptions) pauseStep.captionOptions = captionOptions;
            return pauseStep;
        }

        var step = { target: target, action: action, delay: delay, noHighlight: noHighlight, noScroll: noScroll };
        if (chapter) step.chapter = true;
        if (value !== undefined) step.value = value;
        if (caption !== undefined) step.caption = caption;
        if (captionOptions) step.captionOptions = captionOptions;
        return step;
    }

    /**
     * Normalise a mixed array of step objects and shorthand strings into
     * a uniform array of step objects.
     */
    function parseSteps(raw) {
        if (!raw || !raw.length) return [];
        var out = [];
        for (var i = 0; i < raw.length; i++) {
            var item = raw[i];
            if (typeof item === 'string') {
                out.push(parseStepString(item));
            } else if (item.actions && Array.isArray(item.actions)) {

                    actions: [],
                    delay: typeof item.delay === 'number' ? item.delay : 2000,
                    noHighlight: !!item.noHighlight,
                    chapter: !!item.chapter
                };
                for (var j = 0; j < item.actions.length; j++) {
                    var sub = item.actions[j];
                    var parsed = {
                        target: sub.target || null,
                        action: sub.action || 'highlight',
                        value: sub.value
                    };
                    if (typeof sub.delay === 'number') parsed.delay = sub.delay;
                    multi.actions.push(parsed);
                }
                if (item.caption !== undefined) multi.caption = item.caption;
                if (item.captionOptions) multi.captionOptions = item.captionOptions;
                out.push(multi);
            } else {
                // Already an object — apply defaults
                var obj = {
                    target: item.target || null,
                    action: item.action || 'highlight',
                    value: item.value,
                    delay: typeof item.delay === 'number' ? item.delay : 2000,
                    noHighlight: !!item.noHighlight,
                    chapter: !!item.chapter
                };
                if (item.caption !== undefined) obj.caption = item.caption;
                if (item.captionOptions) obj.captionOptions = item.captionOptions;
                out.push(obj);
            }
        }
        return out;
    }

    //   --gs-control-bottom        Bottom offset (default: 12px)

    var CONTROLS_CSS = [
        ':host {',

        '  0%   { transform: scale(1); opacity: 0.5; }',

        '}',
        '.gs-control-btn {',
        '  width: var(--gs-control-size, 44px);',
        '  height: var(--gs-control-size, 44px);',
        '  border-radius: var(--gs-control-radius, 8px);',
        '  border: var(--gs-control-border, none);',

        '  cursor: pointer;',
        '  display: flex; align-items: center; justify-content: center;',
        '  transition: background 0.2s, transform 0.2s;',
        '  position: relative;',
        '}',
        '.gs-control-btn::before {',
        '  content: ""; position: absolute; inset: 0;',
        '  border-radius: inherit;',
        '  background: var(--gs-control-color, #fff);',
        '  opacity: 0; pointer-events: none;',
        '}',
        '.gs-control-btn--pulse::before {',
        '  animation: gs-btn-pulse 0.5s ease-out;',

        '  background: var(--gs-control-bg-hover, rgba(0,0,0,0.75));',
        '  transform: scale(1.05);',
        '}',
        '.gs-control-btn svg {',
        '  width: var(--gs-control-icon-size, 22px);',
        '  height: var(--gs-control-icon-size, 22px);',
        '  fill: currentColor;',
        '}',

        '  content: attr(data-tooltip);',

        '.gs-control-btn--speed {',

        if (fsEl) {

            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        } else {
            var c = this.container;
            if (c.requestFullscreen) c.requestFullscreen();
            else if (c.webkitRequestFullscreen) c.webkitRequestFullscreen();
        }
    };

    Guidestar.prototype._onFullscreenChange = function () {
        if (!this._fullscreenBtn) return;
        var isFS = (document.fullscreenElement || document.webkitFullscreenElement) === this.container;
        this._fullscreenBtn.innerHTML = isFS ? ICON_FULLSCREEN_EXIT : ICON_FULLSCREEN;
        this._fullscreenBtn.setAttribute('aria-label', isFS ? 'Exit full screen' : 'Full screen');
        this._fullscreenBtn.setAttribute('data-tooltip', isFS ? 'Exit full screen' : 'Full screen');
    };

    // ── Resize handle ────────────────────────────────────────────────────────

    /**
     * Create a drag handle in the bottom-right corner of the container.
     * Dragging it resizes the container width (and height) via pointer events.
     * A dimension badge is shown during the drag.
     */
    Guidestar.prototype._createResizeHandle = function () {
        var self = this;
        var container = this.container;

        var handle = document.createElement('div');
        handle.className = 'gs-resize-handle';
        handle.setAttribute('aria-hidden', 'true');
        handle.setAttribute('title', 'Drag to resize');
        container.appendChild(handle);
        this._resizeHandle = handle;

        var badge = document.createElement('div');
        badge.className = 'gs-resize-badge';
        container.appendChild(badge);
        this._resizeBadge = badge;

        var startX, startY, startW, startH;

        handle.addEventListener('pointerdown', function (e) {
            e.preventDefault();
            e.stopPropagation();
            handle.setPointerCapture(e.pointerId);

            var rect = container.getBoundingClientRect();
            startX = e.clientX;
            startY = e.clientY;
            startW = rect.width;
            startH = rect.height;

            badge.textContent = Math.round(startW) + ' \u00d7 ' + Math.round(startH);
            badge.classList.add('gs-resize-badge--visible');

            handle.addEventListener('pointermove', onMove);
            handle.addEventListener('pointerup', onUp);
            handle.addEventListener('pointercancel', onUp);
        });

        function onMove(e) {
            var dX = e.clientX - startX;
            var dY = e.clientY - startY;
            var newW = Math.max(150, startW + dX);
            var newH = Math.max(100, startH + dY);
            container.style.width = newW + 'px';
            container.style.height = newH + 'px';
            badge.textContent = Math.round(newW) + ' \u00d7 ' + Math.round(newH);
        }

        function onUp() {
            badge.classList.remove('gs-resize-badge--visible');
            handle.removeEventListener('pointermove', onMove);
            handle.removeEventListener('pointerup', onUp);
            handle.removeEventListener('pointercancel', onUp);
        }
    };

    // ── Branding badge ───────────────────────────────────────────────────────

    Guidestar.prototype._createBrandingBadge = function () {
        var el = document.createElement('a');
        el.className = 'gs-branding';
        el.href = 'https://guidestar.readthedocs.io';
        el.target = '_blank';
        el.rel = 'noopener noreferrer';
        el.setAttribute('aria-label', 'demo powered by guidestar');
        el.setAttribute('data-tooltip', 'demo powered by guidestar');
        el.innerHTML = ICON_BRANDING_LOGO;
        this.container.appendChild(el);
        this._brandingEl = el;
    };

    // ── Interaction blocker ──────────────────────────────────────────────────

    /**
     * Create a transparent glass-pane div that sits above the content root
     * (z-index 1) but below all control overlays.  When allowUserInteractions
     * is false (the default), this prevents clicks from reaching the underlying
     * wireframe or live-URL source and instead toggles play/pause.
     *
     * The panel's position: absolute; inset: 0 means it exactly covers the
     * container, relying on [data-guidestar]'s overflow: hidden to clip it.
     */
    Guidestar.prototype._createInteractionBlocker = function () {
        var self = this;
        var el = document.createElement('div');
        el.className = 'gs-interaction-blocker';
        el.setAttribute('aria-hidden', 'true');
        this.container.appendChild(el);
        this._interactionBlocker = el;

        el.addEventListener('click', function (e) {
            if (!e.isTrusted) return;
            e.stopPropagation();
            e.preventDefault();
            // In static mode there is no playback to toggle.
            if (self._isStatic) return;
            if (self._playing) {
                self._userPaused = true;
                self._hideCursor();
                self.pause();
            } else {
                self._userPaused = false;
                self.play();
            }
        });
    };


    // ── Scroll helpers ───────────────────────────────────────────────────────

    /**
     * Find the nearest ancestor of el (within _contentRoot) that is
     * actually scrollable (overflows in the Y axis).
     * Falls back to _contentRoot itself.
     */
    Guidestar.prototype._findScrollParent = function (el) {
        var root = this._contentRoot;
        var node = el.parentElement;
        while (node && node !== root) {
            var style = window.getComputedStyle(node);
            var overflow = style.overflowY;
            if ((overflow === 'auto' || overflow === 'scroll') && node.scrollHeight > node.clientHeight) {
                return node;
            }
            node = node.parentElement;
        }
        // Fall back: check _contentRoot itself
        var rootStyle = window.getComputedStyle(root);
        if (rootStyle.overflowY === 'auto' || rootStyle.overflowY === 'scroll') {
            return root;
        }
        return null; // not scrollable — nothing to scroll
    };

    /**
     * Returns true if el is fully visible within scroller's viewport.
     */
    Guidestar.prototype._isInViewOf = function (el, scroller) {
        var scrollerRect = scroller.getBoundingClientRect();
        var elRect = el.getBoundingClientRect();
        return (
            elRect.top    >= scrollerRect.top    - 2 &&
            elRect.bottom <= scrollerRect.bottom + 2
        );
    };

    /**
     * Create the scroll indicator overlay (once per instance).
     * A small badge with a ↓ icon that briefly flashes at the edge of a
     * scrolling container to signal that an auto-scroll occurred.
     */
    Guidestar.prototype._createScrollIndicator = function () {
        var el = document.createElement('div');
        el.className = 'gs-scroll-indicator';
        el.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 4v12.17l-5.59-5.58L4 12l8 8 8-8-1.41-1.41L13 16.17V4h-2z"/></svg>';
        this.container.appendChild(el);
        this._scrollIndicatorEl = el;
    };

    /**
     * Flash the scroll indicator badge at the bottom-right of scroller.
     * Position is calculated relative to this.container.
     */
    Guidestar.prototype._showScrollIndicator = function (scroller) {
        var indicator = this._scrollIndicatorEl;
        if (!indicator || this._reduceMotion) return;
        var containerRect = this.container.getBoundingClientRect();
        var scrollerRect  = scroller.getBoundingClientRect();
        // Place the badge at the bottom-right of the scroller, inset from edges
        var right  = containerRect.right  - scrollerRect.right  + 12;
        var bottom = containerRect.bottom - scrollerRect.bottom + 12;
        indicator.style.right  = Math.max(right,  8) + 'px';
        indicator.style.bottom = Math.max(bottom, 8) + 'px';
        indicator.classList.remove('gs-scroll-indicator--active');
        void indicator.offsetWidth; // force reflow
        indicator.classList.add('gs-scroll-indicator--active');
    };

    /**
     * Scroll el into view within its scrollable parent, then call callback.
     * Shows the scroll indicator and waits for the scroll animation before
     * calling callback.
     */
    Guidestar.prototype._scrollTo = function (el, callback) {
        var scroller = this._findScrollParent(el);
        if (!scroller || this._isInViewOf(el, scroller)) {
            if (callback) callback();
            return;
        }

        // Calculate target scrollTop to centre el within scroller
        var scrollerRect = scroller.getBoundingClientRect();
        var elRect = el.getBoundingClientRect();
        var elRelTop = elRect.top - scrollerRect.top + scroller.scrollTop;
        var target = Math.max(0, Math.min(
            elRelTop - (scroller.clientHeight / 2) + (elRect.height / 2),
            scroller.scrollHeight - scroller.clientHeight
        ));

        // Use a manual RAF animation instead of scrollTo({ behavior:'smooth' })
        // because CSS smooth-scroll is broken inside CSS transform: scale() contexts.
        var startTop = scroller.scrollTop;
        var startTime = null;
        var DURATION = 400;
        this._showScrollIndicator(scroller);

        function easeInOut(t) {
            return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
        }

        function step(ts) {
            if (!startTime) startTime = ts;
            var progress = Math.min((ts - startTime) / DURATION, 1);
            scroller.scrollTop = startTop + (target - startTop) * easeInOut(progress);
            if (progress < 1) {
                requestAnimationFrame(step);
            } else {
                if (callback) callback();
            }
        }
        requestAnimationFrame(step);
    };

    /**
     * Fetch src, optionally extract the first element matching selector from
     * the response, inject into _contentRoot, run scripts, and call callback.
     *
     * @param {string}      src      URL to fetch
     * @param {string|null} selector CSS selector to extract from fetched HTML,
     *                               or null to use the full response body
     * @param {Function}    callback Called after content is ready
     */
    Guidestar.prototype._loadHTML = function (src, selector, callback) {
        var self = this;
        fetch(src)
            .then(function (resp) {
                if (!resp.ok) throw new Error('Failed to load ' + src + ': ' + resp.status);
                return resp.text();
            })
            .then(function (html) {
                if (selector) {
                    var doc = new DOMParser().parseFromString(html, 'text/html');
                    var el = doc.querySelector(selector);
                    if (!el) {
                        throw new Error('htmlSrcSelector "' + selector + '" not found in ' + src);
                    }
                    self._contentRoot.innerHTML = el.outerHTML;
                } else {
                    // Parse the full HTML document to isolate the wireframe's styles.
                    // Setting innerHTML directly with a complete HTML document causes <style>
                    // blocks (including body/html rules) to leak into the host page's stylesheet.
                    // Instead we:
                    //   1. Extract <style> elements and re-inject them scoped via CSS @scope
                    //      so they only apply inside this demo's content root.
                    //   2. Use only the parsed body content for innerHTML.
                    var parsedDoc = new DOMParser().parseFromString(html, 'text/html');

                    // Collect styles from <head> and any stray <style> blocks in <body>
                    var styleEls = Array.from(parsedDoc.querySelectorAll('style'));
                    if (styleEls.length > 0) {
                        var cssText = styleEls.map(function (s) { return s.textContent; }).join('\n');
                        // Remap body/html/:root selectors to :scope so they style the
                        // content root container rather than the outer page body.
                        // Use a negative lookbehind for '-' so compound class names like
                        // .card-body, .modal-body, .step-body are NOT remapped.
                        var remapped = cssText
                            .replace(/(?<!-)\bbody\b/g, ':scope')
                            .replace(/(?<!-)\bhtml\b/g, ':scope')
                            .replace(/:root\b/g, ':scope');

                        // Remove any previously-injected scope style (e.g. on a reload-restart)
                        // before injecting a fresh one so styles don't stack.
                        if (self._scopeStyleEl) {
                            self._scopeStyleEl.remove();
                            self._scopeStyleEl = null;
                        }

                        var styleEl = document.createElement('style');
                        // @scope limits rule application to descendants of the content root.
                        // :scope inside @scope refers to the scope root (.gs-scope-xxx) itself.
                        styleEl.textContent = '@scope (.' + self._scopeClass + ') {\n' + remapped + '\n}';
                        styleEl.setAttribute('data-gs-scope', self._scopeClass);
                        document.head.appendChild(styleEl);
                        self._scopeStyleEl = styleEl;
                    }

                    // Remove any <style> elements from the body so they don't leak when
                    // innerHTML is set (browsers process <style> anywhere in the DOM tree).
                    Array.from(parsedDoc.body.querySelectorAll('style')).forEach(function (s) { s.remove(); });
                    self._contentRoot.innerHTML = parsedDoc.body.innerHTML;
                }
                self._runScripts();
                // Dispatch event so external code can react (sets up toolbar handlers, etc.)
                document.dispatchEvent(new CustomEvent('guidestar-loaded', {
                    detail: { container: self.container, instance: self }
                }));
                // Run init steps silently, then snapshot the post-init state as the restart baseline
                self._runInitSteps(function () {
                    self._initialHTML = self._contentRoot.innerHTML;
                    if (callback) callback();
                });
            })
            .catch(function (err) {
                console.error('[Guidestar] ' + err.message);
                self._contentRoot.innerHTML =
                    '<p style="color:red;padding:16px;">Error loading demo HTML: ' + err.message + '</p>';
            });
    };

    /**
     * Run initSteps synchronously (no delay, no highlight).
     * Called after HTML loads and guidestar-loaded has fired, before
     * _initialHTML is snapshotted and before _onReady()/autoStart.
     *
     * Supports non-time-based step fields: target, action, actions,
     * caption, captionOptions, noHighlight.  In static mode the last
     * caption shown and the last targeted element are preserved so the
     * cursor can be placed there by _onReady().
     */
    Guidestar.prototype._runInitSteps = function (done) {
        var steps = this._initSteps || [];
        this._lastInitEl = null;
        for (var i = 0; i < steps.length; i++) {
            var step = steps[i];
            // Build a clean copy with time-based fields stripped
            var initStep = {};
            for (var k in step) { if (Object.prototype.hasOwnProperty.call(step, k)) initStep[k] = step[k]; }
            initStep.noHighlight = true;
            initStep.delay = 0;
            var target = step.target || (step.actions && step.actions.length ? step.actions[0].target : null);
            var el = null;
            if (target) {
                el = this._contentRoot.querySelector(target) || this.container.querySelector(target);
            }
            // Track last targeted element for static cursor placement
            if (el) this._lastInitEl = el;
            // Pass null callback so _executeAction runs synchronously (no sub-action timeouts)
            this._executeAction(initStep, el, null);
            // Show caption if provided (persists until next step or _hideCaption)
            if (step.caption) {
                this._showCaption(step, el);
            }
        }
        if (done) done();
    };

    Guidestar.prototype._applyViewportScale = function () {
        var vp = this.config.viewport;
        if (!vp) return;
        var containerW = this.container.clientWidth;
        if (!containerW) return;
        var scale = containerW / vp;
        this._contentRoot.style.width = vp + 'px';
        this._contentRoot.style.transform = 'scale(' + scale + ')';
        this._contentRoot.style.transformOrigin = 'top left';
        // Expand the content root's effective height so the scaled content
        // fills the container vertically — avoids a gap at the bottom.
        var containerH = this.container.clientHeight;
        if (containerH) {
            this._contentRoot.style.height = Math.ceil(containerH / scale) + 'px';
        }
    };

    Guidestar.prototype._onReady = function () {
        var self = this;
        // Apply viewport scaling now and whenever the container is resized.
        if (this.config.viewport) {
            this._applyViewportScale();
            if (typeof ResizeObserver !== 'undefined') {
                this._resizeObserver = new ResizeObserver(function () {
                    self._applyViewportScale();
                });
                this._resizeObserver.observe(this.container);
            }
        }
        // Static mode: place cursor at last init-step target (if cursor enabled)
        // and convert any gs-highlight elements to the persistent blinking variant.
        if (this._isStatic) {
            if (this._cursorEl && this._lastInitEl) {
                var containerRect = this.container.getBoundingClientRect();
                var elRect = this._lastInitEl.getBoundingClientRect();
                var x = (elRect.left - containerRect.left) + elRect.width / 2;
                var y = (elRect.top - containerRect.top) + elRect.height / 2;
                this._cursorX = x;
                this._cursorY = y;
                this._cursorEl.style.transform = 'translate(' + x + 'px,' + y + 'px)';
                this._cursorEl.style.opacity = '1';
            }
            var highlighted = this._contentRoot.querySelectorAll('.gs-highlight');
            for (var i = 0; i < highlighted.length; i++) {
                highlighted[i].classList.remove('gs-highlight');
                highlighted[i].classList.add('gs-highlight-persist');
            }
            if (this._lastInitEl) {
                this._lastInitEl.classList.remove('gs-highlight');
                this._lastInitEl.classList.add('gs-highlight-persist');
            }
            return;
        }
        if (!this.config.autoStart || !this._steps.length) return;
        this._waitForVisible();
    };

    // ── Viewport gating via IntersectionObserver ────────────────────────

    Guidestar.prototype._waitForVisible = function () {
        var self = this;
        if (typeof IntersectionObserver === 'undefined') {
            // Fallback: start immediately
            this.play();
            return;
        }
        this._observer = new IntersectionObserver(function (entries) {
            for (var i = 0; i < entries.length; i++) {
                if (entries[i].isIntersecting && entries[i].intersectionRatio >= 0.5) {
                    self._observer.disconnect();
                    self._observer = null;
                    self.play();
                    break;
                }
            }
        }, { threshold: [0.5] });
        this._observer.observe(this.container);
    };

    // ── Accessibility helpers ───────────────────────────────────────────

    Guidestar.prototype._shouldReduceMotion = function () {
        var cfg = this.config.reduceMotion;
        if (cfg === true) return true;
        if (cfg === false) return false;
        // 'auto' or undefined — honour OS preference
        if (typeof window.matchMedia === 'function') {
            return window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        }
        return false;
    };

    Guidestar.prototype._createLiveRegion = function () {
        var el = document.createElement('div');
        el.setAttribute('aria-live', 'polite');
        el.setAttribute('aria-atomic', 'true');
        el.className = 'gs-sr-only';
        el.style.cssText = 'position:absolute;width:1px;height:1px;padding:0;margin:-1px;'
            + 'overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;';
        this.container.appendChild(el);
        this._liveRegion = el;
    };

    Guidestar.prototype._announce = function (message) {
        if (!this._liveRegion) return;
        var region = this._liveRegion;
        region.textContent = '';
        setTimeout(function () { region.textContent = message; }, 50);
    };

    Guidestar.prototype._handleKeydown = function (e) {
        // Don't intercept when focus is on form controls inside the demo
        var tag = e.target.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || e.target.isContentEditable) {
            return;
        }

        var handled = true;
        switch (e.key) {
            case ' ':
            case 'Enter':
                if (this._playing) { this.pause(); } else { this.play(); }
                break;
            case 'ArrowRight':
                if (this._stepIndex < this._steps.length - 1) {
                    this.jumpToStep(this._stepIndex + 1);
                    this._announce('Step ' + (this._stepIndex + 1) + ' of ' + this._steps.length);
                }
                break;
            case 'ArrowLeft':
                if (this._stepIndex > 0) {
                    this.jumpToStep(this._stepIndex - 1);
                    this._announce('Step ' + (this._stepIndex + 1) + ' of ' + this._steps.length);
                }
                break;
            case 'Home':
                this.jumpToStep(this._rangeStart);
                this._announce('Step ' + (this._rangeStart + 1) + ' of ' + this._steps.length);
                break;
            case 'End':
                this.jumpToStep(this._rangeEnd);
                this._announce('Step ' + (this._rangeEnd + 1) + ' of ' + this._steps.length);
                break;
            case '+':
            case '=':
                this._adjustSpeed(1);
                break;
            case '-':
            case '_':
                this._adjustSpeed(-1);
                break;
            case 'r':
            case 'R':
                this.restart();
                break;
            default:
                handled = false;
        }
        if (handled) {
            e.preventDefault();
            e.stopPropagation();
        }
    };

    Guidestar.prototype._adjustSpeed = function (direction) {
        var SPEED_STEPS = [0.25, 0.5, 1, 2, 4];
        var cur = this._speedFactor;
        var newSpeed = cur;
        var i;
        if (direction > 0) {
            for (i = 0; i < SPEED_STEPS.length; i++) {
                if (SPEED_STEPS[i] > cur) { newSpeed = SPEED_STEPS[i]; break; }
            }
        } else {
            for (i = SPEED_STEPS.length - 1; i >= 0; i--) {
                if (SPEED_STEPS[i] < cur) { newSpeed = SPEED_STEPS[i]; break; }
            }
        }
        if (newSpeed !== cur) {
            this._speedFactor = newSpeed;
            if (this._speedLabel) {
                this._speedLabel.textContent = newSpeed + '\u00d7';
                this._speedLabel.classList.toggle('gs-speed-label--nondefault', newSpeed !== 1);
            }
            this._announce('Speed: ' + newSpeed + 'x');
        }
    };

    // ── Playback controls ───────────────────────────────────────────────

    Guidestar.prototype.play = function () {
        if (this._playing) return;
        // If stepRange is set and the current index is outside the range
        // (e.g. user jumped out-of-range or this is the first play), snap
        // back to the range start so autoplay stays within the window.
        if (this._stepIndex < this._rangeStart || this._stepIndex > this._rangeEnd) {
            this._stepIndex = this._rangeStart;
        }
        this._playing = true;
        this._started = true;
        this._userPaused = false;
        this._updateControlBtn();
        this._updateTooltip();
        if (this._fullscreenHost) {
            this._fullscreenHost.classList.remove('gs-fullscreen-host--visible');
        }
        this._announce('Playing');
        this._runStep();
    };

    Guidestar.prototype.pause = function () {
        if (!this._playing) return;
        this._playing = false;
        if (this._timer) {
            clearTimeout(this._timer);
            this._timer = null;
        }
        this._updateControlBtn(true);
        this._updateTooltip();
        if (this._fullscreenHost) {
            this._fullscreenHost.classList.add('gs-fullscreen-host--visible');
        }
        this._announce('Paused at step ' + (this._stepIndex + 1) + ' of ' + this._steps.length);
    };

    Guidestar.prototype.restart = function () {
        this._userPaused = false;
        this.pause();
        this._showRestartOverlay();
        this._clearHighlights();
        this._hideCaption();
        this._resetCursor();
        this._stepIndex = this._rangeStart;
        this._htmlSnapshots = [];

        // reloadOnRestart: re-fetch the source URL so the DOM is fully
        // re-initialised, including all event listeners. This avoids the
        // stale-closure problem that arises when innerHTML reset + _runScripts()
        // is not enough to fully reset a live application page.
        if (this.config.reloadOnRestart && this.config.htmlSrc) {
            var self = this;
            this._loadHTML(
                this.config.htmlSrc,
                this.config.htmlSrcSelector || null,
                function () {
                    self._runInitSteps(function () {
                        self._initialHTML = self._contentRoot.innerHTML;
                        self._htmlSnapshots = [];
                        self._updateTimelineDots();
                        self.play();
                    });
                }
            );
            return; // async path — play() called in callback above
        }

        // Default: restore the content DOM to its initial state so the demo
        // starts fresh (removes dynamically added viewers, sidebars, etc.)
        if (this._initialHTML !== undefined) {
            this._contentRoot.innerHTML = this._initialHTML;
            this._runScripts();
            // Re-dispatch so external code (e.g. jdaviz-wireframe-actions)
            // can re-wire toolbar clicks, icons, etc.
            document.dispatchEvent(new CustomEvent('guidestar-loaded', {
                detail: { container: this.container, instance: this }
            }));
        }

        this._updateTimelineDots();
        this.play();
    };

    Guidestar.prototype._updateControlBtn = function (pulse) {
        var btn = this._controlBtn;
        var restartBtn = this._restartBtn;
        if (!btn) return;
        if (this._playing) {
            btn.innerHTML = ICON_PAUSE;
            btn.setAttribute('aria-label', 'Pause demo');
            btn.setAttribute('data-tooltip', 'Pause');
            btn.classList.remove('gs-control-btn--pulse');
            if (restartBtn) restartBtn.hidden = true;
            if (this._speedRow) this._speedRow.classList.remove('gs-speed-row--visible');
            if (this._speedLabel) this._speedLabel.classList.remove('gs-speed-label--visible');
        } else {
            btn.innerHTML = ICON_PLAY;
            btn.setAttribute('aria-label', 'Play demo');
            btn.setAttribute('data-tooltip', 'Play');
            if (restartBtn) restartBtn.hidden = false;
            if (this._speedRow) this._speedRow.classList.add('gs-speed-row--visible');
            if (this._speedLabel) this._speedLabel.classList.add('gs-speed-label--visible');
            if (pulse) {
                btn.classList.remove('gs-control-btn--pulse');
                void btn.offsetWidth;
                btn.classList.add('gs-control-btn--pulse');
            }
        }
    };

    // ── Animated cursor ─────────────────────────────────────────────────

    var CURSOR_SVG = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none">'

                if (s.actions && Array.isArray(s.actions)) {
                    skipStep = s.actions.every(function (sub) {
                        return sub.action === 'highlight';
                    });
                } else {
                    skipStep = (!s.action || s.action === 'highlight' || s.action === 'pause');
                }
                if (skipStep) continue;
                if (this.config.timeline !== false && !this._htmlSnapshots[j]) {
                    this._htmlSnapshots[j] = this._contentRoot.innerHTML;
                }
                var e = null;
                if (s.target) {
                    e = this._contentRoot.querySelector(s.target) ||
                        this.container.querySelector(s.target);
                }
                this._executeAction(s, e);
            }
        }
    };

    // ── Step execution engine ───────────────────────────────────────────

    Guidestar.prototype._runStep = function () {
        if (!this._playing) return;
        // End of range (respects stepRange; falls through to _onSequenceEnd for repeat/stop)
        if (this._stepIndex > this._rangeEnd || this._stepIndex >= this._steps.length) {
            this._onSequenceEnd();
            return;
        }

        var self = this;
        var step = this._steps[this._stepIndex];
        var baseDelay = typeof step.delay === 'number' ? step.delay : 2000;
        var delay = baseDelay / this._speedFactor;

        // Snapshot HTML state before this step executes (for backward jumps)
        if (this.config.timeline !== false && !this._htmlSnapshots[this._stepIndex]) {
            this._htmlSnapshots[this._stepIndex] = this._contentRoot.innerHTML;
        }

        // Update timeline dots
        this._updateTimelineDots();

        // If tooltip is activated and visible, keep it anchored to current step
        if (this._tooltipActivated && this._tooltipDotIndex >= 0) {
            this._anchorTooltipToCurrentStep();
        }
        if (this.config.onStepStart) {
            this.config.onStepStart(this._stepIndex, step);
        }

        // Clear previous highlights
        this._clearHighlights();

        // Resolve target element (for multi-action steps, use the first sub-action's target)
        var el = null;
        var stepTarget = step.target || (step.actions && step.actions.length > 0 ? step.actions[0].target : null);
        if (stepTarget) {
            el = this._contentRoot.querySelector(stepTarget);
            if (!el) {
                el = this.container.querySelector(stepTarget);
            }
        }

        // Show caption at the start of the step (while cursor moves)
        this._showCaption(step, el);

        // Callback invoked after the action (and any sub-action delays) finish
        var afterAction = function (cursorOverhead) {
            cursorOverhead = cursorOverhead || 0;
            if (!self._playing) return;
            if (self.config.onStepEnd) {
                self.config.onStepEnd(self._stepIndex, step);
            }
            self._stepIndex++;
            var remaining = cursorOverhead > 0 ? Math.max(delay - cursorOverhead, 100) : delay;
            self._timer = setTimeout(function () {
                self._timer = null;
                self._runStep();
            }, remaining);
        };

        // Animate cursor to target, then execute action.
        // When autoScroll is enabled, scroll the target into view first so the
        // cursor animation lands on a visible element.
        if (this.config.cursor && el) {
            var cursorSpeed = this.config.cursorSpeed / this._speedFactor;
            var doMove = function () {
                self._moveCursorTo(el, function () {
                    if (!self._playing) return;
                    self._executeAction(step, el, function () {
                        afterAction(cursorSpeed);
                    });
                });
            };
            if (self.config.autoScroll && !step.noScroll && step.action !== 'pause') {
                this._scrollTo(el, function () {
                    if (!self._playing) return;
                    doMove();
                });
            } else {
                doMove();
            }
        } else {
            if (this.config.cursor && !step.actions && step.action === 'pause') {
                this._hideCursor();
            }
            // Auto-scroll target into view (unless disabled for this step)
            var shouldScroll = this.config.autoScroll && !step.noScroll && el &&
                               step.action !== 'pause';
            if (shouldScroll) {
                this._scrollTo(el, function () {
                    if (!self._playing) return;
                    self._executeAction(step, el, function () {
                        afterAction(0);
                    });
                });
            } else {
                self._executeAction(step, el, function () {
                    afterAction(0);
                });
            }
        }
    };

    Guidestar.prototype._onSequenceEnd = function () {
        this._clearHighlights();
        this._hideCaption();
        if (this.config.onComplete) {
            this.config.onComplete();
        }
        if (this.config.repeat) {
            var self = this;
            this._stepIndex = this._rangeStart;
            this._htmlSnapshots = [];

            // Restore the content DOM to its initial state before replaying
            if (this._initialHTML !== undefined) {
                this._contentRoot.innerHTML = this._initialHTML;
                this._runScripts();
                document.dispatchEvent(new CustomEvent('guidestar-loaded', {
                    detail: { container: this.container, instance: this }
                }));
            }

            this._resetCursor();
            this._updateTimelineDots();
            this._showRestartOverlay();

            this._timer = setTimeout(function () {
                self._timer = null;
                self._runStep();
            }, 1000 / self._speedFactor);
        } else {
            this._playing = false;
            this._updateControlBtn();
        }
    };

    Guidestar.prototype._executeAction = function (step, el, callback) {
        // Multi-action step: execute sub-actions, optionally with delays between them
        if (step.actions && Array.isArray(step.actions)) {
            var self = this;
            var subs = step.actions;

            var executeSub = function (index) {
                if (index >= subs.length) {
                    if (callback) callback();
                    return;
                }
                var sub = subs[index];
                var subEl = null;
                if (sub.target) {
                    subEl = self._contentRoot.querySelector(sub.target) ||
                            self.container.querySelector(sub.target);
                }
                // Build a synthetic step so custom actions see the sub-action's
                // value/action/target while still inheriting parent metadata.
                var syntheticStep = {
                    action: sub.action,
                    value: sub.value,
                    target: sub.target || null,
                    delay: step.delay,
                    noHighlight: step.noHighlight,
                    caption: step.caption,
                    captionOptions: step.captionOptions
                };
                self._executeSingleAction(sub.action, sub.value, subEl, syntheticStep, function () {
                // If this sub-action has a delay and there is a callback
                // (i.e. we are in live playback, not a jump/replay), schedule
                // the next sub-action after the delay.
                var subDelay = typeof sub.delay === 'number' ? sub.delay / self._speedFactor : 0;
                if (subDelay > 0 && callback) {
                    self._timer = setTimeout(function () {
                        self._timer = null;
                        if (!self._playing) return;
                        executeSub(index + 1);
                    }, subDelay);
                } else {
                    executeSub(index + 1);
                }
                });
            };

            executeSub(0);
            return;
        }

        this._executeSingleAction(step.action, step.value, el, step, callback);
    };

    Guidestar.prototype._executeSingleAction = function (action, value, el, step, callback) {

        // Check custom actions first
        if (_customActions[action]) {
            _customActions[action].call(this, step, el, this._contentRoot);
            if (callback) callback();
            return;
        }

        switch (action) {
            case 'pause':
                // Do nothing — the delay handles the wait
                break;

            case 'click':
                if (el) {
                    el.click();
                    if (!step.noHighlight) this._highlight(el, step.delay);
                }
                break;

            case 'add-class':
                if (el && value) {
                    value.split(/\s+/).forEach(function (c) { el.classList.add(c); });
                    if (!step.noHighlight) this._highlight(el, step.delay);
                }
                break;

            case 'remove-class':
                if (el && value) {
                    value.split(/\s+/).forEach(function (c) { el.classList.remove(c); });
                }
                break;

            case 'toggle-class':
                if (el && value) {
                    value.split(/\s+/).forEach(function (c) { el.classList.toggle(c); });
                    if (!step.noHighlight) this._highlight(el, step.delay);
                }
                break;

            case 'set-attribute':
                if (el && value) {
                    var sep = value.indexOf(':');
                    if (sep !== -1) {
                        el.setAttribute(value.substring(0, sep), value.substring(sep + 1));
                    }
                    if (!step.noHighlight) this._highlight(el, step.delay);
                }
                break;

            case 'remove-attribute':
                if (el && value) {
                    el.removeAttribute(value);
                }
                break;

            case 'set-value':
                if (el && value !== undefined) {
                    el.value = value;
                    // Dispatch input event so frameworks pick up the change
                    el.dispatchEvent(new Event('input', { bubbles: true }));
                    el.dispatchEvent(new Event('change', { bubbles: true }));
                    if (!step.noHighlight) this._highlight(el, step.delay);
                }
                break;

            case 'set-text':
                if (el && value !== undefined) {
                    el.textContent = value;
                    if (!step.noHighlight) this._highlight(el, step.delay);
                }
                break;

            case 'set-html':
                if (el && value !== undefined) {
                    el.innerHTML = value;
                    if (!step.noHighlight) this._highlight(el, step.delay);
                }
                break;

            case 'scroll-into-view':
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    if (!step.noHighlight) this._highlight(el, step.delay);
                }
                break;

            case 'scroll-to':
                // Explicit scroll — auto-scroll helper handles the animation;
                // callback must be called asynchronously, so we return early.
                if (el) {
                    var self = this;
                    this._scrollTo(el, function () { if (callback) callback(); });
                    return;
                }
                break;

            case 'dispatch-event':
                if (el && value) {
                    var evtSep = value.indexOf(':');
                    var evtName, evtDetail;
                    if (evtSep !== -1) {
                        evtName = value.substring(0, evtSep);
                        try { evtDetail = JSON.parse(value.substring(evtSep + 1)); }
                        catch (_e) { evtDetail = value.substring(evtSep + 1); }
                    } else {
                        evtName = value;
                        evtDetail = null;
                    }
                    el.dispatchEvent(new CustomEvent(evtName, {
                        bubbles: true, detail: evtDetail
                    }));
                    if (!step.noHighlight) this._highlight(el, step.delay);
                }
                break;

            case 'highlight':
                if (el) {
                    this._highlight(el, step.delay);
                }
                break;

            case 'type-text':
                if (el && value !== undefined) {
                    this._typeText(el, value, step, callback);
                    return; // callback is called by _typeText when done
                }
                break;

            default:
                console.warn('[Guidestar] Unknown action: ' + action);
        }
        if (callback) callback();
    };

    // ── Highlight helpers ───────────────────────────────────────────────

    Guidestar.prototype._highlight = function (el, duration) {
        var self = this;
        el.classList.add('gs-highlight');
        this._highlightedEls.push(el);
        var dur = Math.max(duration - 200, 400);
        setTimeout(function () {
            el.classList.remove('gs-highlight');
            var idx = self._highlightedEls.indexOf(el);
            if (idx !== -1) self._highlightedEls.splice(idx, 1);
        }, dur);
    };

    Guidestar.prototype._clearHighlights = function () {
        for (var i = 0; i < this._highlightedEls.length; i++) {
            this._highlightedEls[i].classList.remove('gs-highlight');
        }
        this._highlightedEls = [];
    };

    // ── Type-text action ────────────────────────────────────────────────

    /**
     * Animate typing text into an element over the step's delay.
     *
     * Automatically chooses letter-at-a-time or word-at-a-time based on
     * what yields a comfortable interval (>= 40ms per chunk).  For very
     * short text or very long delays, letter mode is used; for long text
     * with tight timing, word mode keeps it readable.
     *
     * Sets .value for input/textarea elements, .textContent otherwise.
     * Dispatches "input" events on each keystroke for inputs.
     */
    Guidestar.prototype._typeText = function (el, text, step, callback) {
        var self = this;
        var isInput = (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA');
        var baseDelay = typeof step.delay === 'number' ? step.delay : 2000;
        var totalTime = baseDelay / this._speedFactor;

        // Reserve 20% of the delay for the post-typing pause
        var typingTime = totalTime * 0.8;

        // Decide granularity: split into letters, check if interval is comfortable
        var letters = text.split('');
        var letterInterval = letters.length > 0 ? typingTime / letters.length : typingTime;
        var MIN_INTERVAL = 40; // ms — minimum time per chunk

        var chunks, mode;
        if (letterInterval >= MIN_INTERVAL) {
            // Letter-at-a-time
            chunks = letters;
            mode = 'letter';
        } else {
            // Word-at-a-time: split on spaces, preserving spacing
            chunks = text.match(/\S+\s*/g) || [text];
            var wordInterval = chunks.length > 0 ? typingTime / chunks.length : typingTime;
            if (wordInterval < MIN_INTERVAL && chunks.length > 1) {
                // Even words are too fast — group into larger chunks
                var targetChunks = Math.max(1, Math.floor(typingTime / MIN_INTERVAL));
                var charsPerChunk = Math.ceil(text.length / targetChunks);
                chunks = [];
                for (var c = 0; c < text.length; c += charsPerChunk) {
                    chunks.push(text.substring(c, c + charsPerChunk));
                }
            }
            mode = 'word';
        }

        var interval = chunks.length > 0 ? typingTime / chunks.length : 0;
        var currentText = '';
        var chunkIndex = 0;

        if (!step.noHighlight) this._highlight(el, baseDelay);

        // For non-live playback (jumpToStep replay), set instantly
        if (!callback) {
            if (isInput) {
                el.value = text;
                el.dispatchEvent(new Event('input', { bubbles: true }));
                el.dispatchEvent(new Event('change', { bubbles: true }));
            } else {
                el.textContent = text;
            }
            return;
        }

        function typeNextChunk() {
            if (!self._playing || chunkIndex >= chunks.length) {
                // Finished typing — set final value to be safe
                if (isInput) {
                    el.value = text;
                    el.dispatchEvent(new Event('input', { bubbles: true }));
                    el.dispatchEvent(new Event('change', { bubbles: true }));
                } else {
                    el.textContent = text;
                }
                if (callback) callback();
                return;
            }

            currentText += chunks[chunkIndex];
            chunkIndex++;

            if (isInput) {
                el.value = currentText;
                el.dispatchEvent(new Event('input', { bubbles: true }));
            } else {
                el.textContent = currentText;
            }

            self._timer = setTimeout(typeNextChunk, interval);
        }

        typeNextChunk();
    };

    // ── Cleanup ─────────────────────────────────────────────────────────

    Guidestar.prototype.destroy = function () {
        this.pause();
        this._clearHighlights();
        this._hideCaption();
        if (this._liveRegion && this._liveRegion.parentNode) {
            this._liveRegion.parentNode.removeChild(this._liveRegion);
            this._liveRegion = null;
        }
        if (this._observer) {
            this._observer.disconnect();
            this._observer = null;
        }
        if (this._timelineEl && this._timelineEl.parentNode) {
            this._timelineEl.parentNode.removeChild(this._timelineEl);
            this._timelineEl = null;
            this._timelineDots = [];
        }
        if (this._tooltipEl && this._tooltipEl.parentNode) {
            this._tooltipEl.parentNode.removeChild(this._tooltipEl);
            this._tooltipEl = null;
        }
        this._cancelTooltipHide();
        if (this._timelineLeaveTimer) {
            clearTimeout(this._timelineLeaveTimer);
            this._timelineLeaveTimer = null;
        }
        if (this._restartOverlay && this._restartOverlay.parentNode) {
            this._restartOverlay.parentNode.removeChild(this._restartOverlay);
            this._restartOverlay = null;
        }
        this._htmlSnapshots = [];
        this.container.removeAttribute('data-guidestar-initialized');
    };

    // ── Static: register custom action ──────────────────────────────────

    /**
     * Register a custom action handler.
     *
     * @param {string}   name    Action name (e.g. "select-tab")
     * @param {Function} handler Called as handler.call(instance, step, el, contentRoot)
     */
    Guidestar.registerAction = function (name, handler) {
        _customActions[name] = handler;
    };

    // ── Export ───────────────────────────────────────────────────────────

    root.Guidestar = Guidestar;

    // Signal that Guidestar is available for action registration.
    // Scripts loaded before the controller (e.g. directive :js: files) can
    // listen for this event to register custom actions before auto-discover.
    document.dispatchEvent(new CustomEvent('guidestar-ready'));

    // ── Auto-discovery ──────────────────────────────────────────────────

    function autoDiscover() {
        var containers = document.querySelectorAll(
            '[data-guidestar]:not([data-guidestar-initialized])'
        );
        for (var i = 0; i < containers.length; i++) {
            var el = containers[i];
            var configAttr = el.getAttribute('data-guidestar-config');
            var config = {};
            if (configAttr) {
                try { config = JSON.parse(configAttr); }
                catch (e) { console.error('[Guidestar] Bad config JSON:', e); }
            }
            new Guidestar(el, config);
        }
    }

    // Run auto-discovery on DOMContentLoaded and on the custom event
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', autoDiscover);
    } else {
        autoDiscover();
    }
    document.addEventListener('guidestar-loaded', autoDiscover);

})(typeof window !== 'undefined' ? window : this);

        </script>
        </body>
