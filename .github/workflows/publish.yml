name: Release

on:
  # PR trigger ensures packaging doesn't break on each PR.
  pull_request:
  release:
    types: [released]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-n-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    if: github.repository == 'spacetelescope/guidestar'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so hatch-vcs can read tags

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: python -m pip install build twine

      - name: Build sdist and wheel
        run: python -m build --sdist --wheel .

      - name: List dist
        run: ls -l dist/

      - name: Check dist
        run: python -m twine check --strict dist/*

      # Only publish on an actual release, not on PR test runs.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        if: github.event_name == 'release'
