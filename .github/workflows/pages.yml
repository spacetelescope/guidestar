name: Deploy examples to GitHub Pages

on:
  push:
    branches: [main, confluence-support]
    paths:
      - 'examples/**'
      - 'demo-builder/**'
      - 'src/guidestar/static/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install guidestar with recording dependencies
        run: pip install -e ".[record]"

      - name: Build self-contained demo pages
        run: |
          guidestar-build \
            --configs-dir examples/demos \
            --wireframes-dir examples/wireframes \
            --out _site

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Record demo GIFs
        run: guidestar-record --configs-dir examples/demos --site _site --out _site

      - name: Generate index page
        run: guidestar-index --site _site

      - name: Copy static tools
        run: cp demo-builder/index.html _site/demo-builder.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
